name: Branch Policy Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-source-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch promotion rules
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          HEAD="${{ github.event.pull_request.head.ref }}"

          echo "Source: $HEAD"
          echo "Target: $BASE"

          case "$BASE" in

            main)
              if [[ "$HEAD" =~ ^feature/.* ]] || \
                 [[ "$HEAD" =~ ^bugfix/.* ]] || \
                 [[ "$HEAD" =~ ^hotfix/.* ]] || \
                 [[ "$HEAD" =~ ^release/.* ]]; then
                exit 0
              fi
              ;;

            uat-master)
              if [[ "$HEAD" == "main" ]] || \
                 [[ "$HEAD" =~ ^release/.* ]]; then
                exit 0
              fi
              ;;

            prod-master)
              if [[ "$HEAD" == "main" ]] || \
                 [[ "$HEAD" =~ ^release/.* ]]; then
                exit 0
              fi
              ;;

            dev-master)
              if [[ "$HEAD" =~ ^feature/.* ]] || \
                 [[ "$HEAD" =~ ^bugfix/.* ]] || \
                 [[ "$HEAD" =~ ^hotfix/.* ]] || \
                 [[ "$HEAD" =~ ^release/.* ]] || \
                 [[ "$HEAD" == "main" ]]; then
                exit 0
              fi
              ;;
          esac

          echo "❌ Branch $HEAD is not allowed to merge into $BASE"
          exit 1
