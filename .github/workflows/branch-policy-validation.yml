name: Branch Policy Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  validate-source-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch promotion rules
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          HEAD="${{ github.event.pull_request.head.ref }}"
          ENFORCE_RULESETS="true"

          echo "Source: $HEAD"
          echo "Target: $BASE"
          echo "Enforce Rulesets: $ENFORCE_RULESETS"

          IS_VALID=false

          case "$BASE" in
            main)
              if [[ "$HEAD" =~ ^feature/.* ]] || \
                 [[ "$HEAD" =~ ^bugfix/.* ]] || \
                 [[ "$HEAD" =~ ^hotfix/.* ]] || \
                 [[ "$HEAD" =~ ^release/.* ]]; then
                IS_VALID=true
              fi
              ;;
            uat-master)
              if [[ "$HEAD" == "main" ]] || \
                 [[ "$HEAD" =~ ^release/.* ]]; then
                IS_VALID=true
              fi
              ;;
            prod-master)
              if [[ "$HEAD" == "main" ]] || \
                 [[ "$HEAD" =~ ^release/.* ]]; then
                IS_VALID=true
              fi
              ;;
            dev-master)
              if [[ "$HEAD" =~ ^feature/.* ]] || \
                 [[ "$HEAD" =~ ^bugfix/.* ]] || \
                 [[ "$HEAD" =~ ^hotfix/.* ]] || \
                 [[ "$HEAD" =~ ^release/.* ]] || \
                 [[ "$HEAD" == "main" ]]; then
                IS_VALID=true
              fi
              ;;
          esac

          if [ "$ENFORCE_RULESETS" = "false" ]; then
            echo "⚠️ WARNING: GitHub Rulesets enforcement is currently disabled."
            echo "⚠️ The following protections are NOT enforced automatically by GitHub:"
            echo "  - Branch deletion protection"
            echo "  - Required approving review count"
            echo "  - Strict status checks passing before merge"
            echo "Please ensure you manually review and follow team guidelines."
          fi

          if [ "$IS_VALID" = false ]; then
            if [ "$ENFORCE_RULESETS" = "false" ]; then
              echo "❌ ERROR: Branch $HEAD is not allowed to merge into $BASE"
              echo "⚠️ NOTE: Because enforcement is disabled, the check fails (red X) but the merge button will remain enabled."
              exit 1
            else
              echo "❌ ERROR: Branch $HEAD is not allowed to merge into $BASE"
              exit 1
            fi
          else
            echo "✅ Branch merge rules passed."
            exit 0
          fi
