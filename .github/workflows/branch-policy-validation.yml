name: Branch Policy Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, review_requested]

jobs:
  check-reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Check if reviewers are assigned
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          
          echo "Checking reviewers for PR #$PR_NUMBER in $REPO..."
          
          # Check for requested reviewers using GitHub CLI
          REQUESTED_COUNT=$(gh api repos/$REPO/pulls/$PR_NUMBER --jq '.requested_reviewers | length')
          
          # Check for already submitted reviews
          REVIEWS_COUNT=$(gh api repos/$REPO/pulls/$PR_NUMBER/reviews --jq 'length')
          
          if [ "$REQUESTED_COUNT" -eq 0 ] && [ "$REVIEWS_COUNT" -eq 0 ]; then
            echo "::warning title=Missing Reviewers::No reviewers have been assigned to this Pull Request. Please add at least one reviewer."
            # We exit 1 to fail THIS specific check so it shows a red X
            exit 1
          else
            echo "✅ Reviewers or reviews are present."
          fi

  validate-source-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch promotion rules
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          HEAD="${{ github.event.pull_request.head.ref }}"

          echo "Source: $HEAD"
          echo "Target: $BASE"

          case "$BASE" in

            main)
              if [[ "$HEAD" =~ ^feature/.* ]] || \
                 [[ "$HEAD" =~ ^bugfix/.* ]] || \
                 [[ "$HEAD" =~ ^hotfix/.* ]] || \
                 [[ "$HEAD" =~ ^release/.* ]]; then
                exit 0
              fi
              ;;

            uat-master)
              if [[ "$HEAD" == "main" ]] || \
                 [[ "$HEAD" =~ ^release/.* ]]; then
                exit 0
              fi
              ;;

            prod-master)
              if [[ "$HEAD" == "main" ]] || \
                 [[ "$HEAD" =~ ^release/.* ]]; then
                exit 0
              fi
              ;;

            dev-master)
              if [[ "$HEAD" =~ ^feature/.* ]] || \
                 [[ "$HEAD" =~ ^bugfix/.* ]] || \
                 [[ "$HEAD" =~ ^hotfix/.* ]] || \
                 [[ "$HEAD" =~ ^release/.* ]] || \
                 [[ "$HEAD" == "main" ]]; then
                exit 0
              fi
              ;;
          esac

          echo "❌ Branch $HEAD is not allowed to merge into $BASE"
          exit 1
